<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Night Sky with Animated Text</title>
    <style>
        body {
            background-color: black;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            color: white;
            font-family: monospace;
        }

        .ascii-container {
            position: absolute;
            white-space: pre;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            line-height: 1.2;
            color: rgba(255, 255, 255, 0.7);
        }

        .shooting-star,
        .bullet {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            animation-timing-function: ease-in-out;
        }

        .shooting-star {
            color: lightblue;
            animation: shootingStar 3s linear infinite;
        }

        .bullet {
            color: red;
            animation: fireBullet 1s linear infinite;
        }

        @keyframes shootingStar {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(300px, 300px) scale(1.5);
                opacity: 0.7;
            }

            100% {
                transform: translate(600px, 600px) scale(0);
                opacity: 0;
            }
        }

        @keyframes fireBullet {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(0, -400px) scale(1.2);
                opacity: 0;
            }
        }

        .star {
            position: absolute;
            font-size: 10px;
            opacity: 0.5;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .animated-text {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #ffcc00;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: textAppear 3s ease-in-out forwards;
        }

        @keyframes textAppear {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .press-start {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeIn 2s ease-in-out 3s forwards;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="ascii-container"> 
        
    </div>

    <div class="animated-text">AWS Cloud Trainer</div>
    <div class="press-start">Press Start to Play</div>

    <script>
        const body = document.body;

        // Add static stars
        function createStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.textContent = '*';
                star.className = 'star';
                star.style.top = `${Math.random() * window.innerHeight}px`;
                star.style.left = `${Math.random() * window.innerWidth}px`;
                star.style.animationDelay = `${Math.random() * 2}s`;
                star.style.color = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.5})`;
                body.appendChild(star);
            }
        }

        // Create a shooting star
        function createShootingStar() {
            const star = document.createElement('div');
            star.textContent = '*';
            star.className = 'shooting-star';
            star.style.top = `${Math.random() * window.innerHeight / 2}px`;
            star.style.left = `${Math.random() * window.innerWidth / 2}px`;
            body.appendChild(star);
            setTimeout(() => body.removeChild(star), 3000);
        }

        // Fire bullets from the center
        function fireBullet() {
            const bullet = document.createElement('div');
            bullet.textContent = '<-o->';
            bullet.className = 'bullet';
            bullet.style.top = `${window.innerHeight / 2}px`;
            bullet.style.left = `${window.innerWidth / 2}px`;
            body.appendChild(bullet);
            setTimeout(() => body.removeChild(bullet), 1000);
        }

        // Add static stars
        createStars();

        // Add shooting stars periodically
        setInterval(createShootingStar, 2000);

        // Fire bullets on key press
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                fireBullet();
            }
        });

        // Listen for "Enter" key to start the game
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Enter') {
                window.location.href = 'space_invaders.html';
            }
        });
    </script>
</body>

</html>
